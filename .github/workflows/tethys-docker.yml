name: tethys-docker

on:
  workflow_dispatch:
  push:
    branches: [ "build/tethys/**" ]
    paths:
      - 'base/builds/tethys/docker/**'
      - '.github/workflows/tethys-docker.yml'

jobs:
  deploy:
    runs-on: ['self-hosted','gpu']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate docker-compose YAML files
        run: |
          cd "${GITHUB_WORKSPACE}"
          find ./base/builds/tethys/docker -type f -name 'docker-compose.yaml' -print0 | while IFS= read -r -d '' file; do
            echo "Validating $file"
            docker compose -f "$file" config > /dev/null
          done

      - name: Create sparse archive for base/builds/tethys/docker
        run: |
          cd "${GITHUB_WORKSPACE}"
          mkdir -p /app/docker
          git archive --format=tar --output /tmp/tethys-docker.tar HEAD base/builds/tethys/docker
          tar -xf /tmp/tethys-docker.tar -C /app/docker

      - name: Deploy docker compose services
        run: |
          find /app/docker -type f -name 'docker-compose.yaml' -print0 | while IFS= read -r -d '' file; do
            dir="$(dirname "$file")"
            echo "Deploying $dir"
            cd "$dir"
            docker compose up -d
          done

## 0-tf-build.yaml
## A re-usable Terraform Plan & Auto-Apply that saves state to a common S3 bucket
## Requires "folder" variable which it'll find a do a sparse checkout and tf build under /base/builds/$folder
## keeps plans and state separated in S3 bucket paths /w unique filenames

env:
  AWS_REGION: "ca-central-1"
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  PROXMOX_VE_API_TOKEN: ${{ vars.PROXMOX_API_ROOT }}=${{ secrets.PROXMOX_API_ROOT_SECRET }}
  PROXMOX_VE_ENDPOINT: ${{ vars.PROXMOX_VE_ENDPOINT }}
  PROXMOX_VE_SSH_USERNAME: ${{ secrets.PROXMOX_SSH_USERNAME }}
  PROXMOX_VE_SSH_PASSWORD: ${{ secrets.PROXMOX_SSH_PASSWORD }}
  PROXMOX_VE_INSECURE: true
  TF_INPUT: 0
  TF_DATA_DIR: "/tf"
  TF_IN_AUTOMATION: "true"
  TF_VAR_proxmox_endpoint_uri: ${{ vars.PROXMOX_VE_ENDPOINT }}
  TF_VAR_target_proxmox_node_name: ${{ vars.PROXMOX_NODE }}
  TF_VAR_target_proxmox_node_ipaddr: ${{ vars.PROXMOX_NODE_IPADDR }}
  TF_VAR_iso_datastore: ${{ vars.ISO_DATASTORE }}
  TF_VAR_proxmox_node: ${{ vars.PROXMOX_NODE }}
  TF_VAR_default_ssh_pub_key: ${{ secrets.DEFAULT_PUB_KEY }}
  TF_VAR_argocd-ssh-private-key: ${{ secrets.ARGOCD_REGULUS_SSH_PRIVATE_KEY }}
  TF_VAR_repository-url: ssh://git@github.com/${{ github.repository }}

on:
  workflow_call:
    inputs:
      folder:
        required: true
        type: string
jobs:
  terraform-plan-and-apply:
    name: Plan and Apply
    if: contains(github.ref, format('build/{0}', inputs.folder) )
    runs-on: ['self-hosted', 'proxmox']
    container:
      image: hashicorp/terraform:latest
      volumes:
        - ${{ inputs.folder }}:/tf
    steps:
      - name: "Checkout Project"
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ./.github
            base/builds/${{ inputs.folder }}
      - run: terraform init
        shell: sh
        working-directory: base/builds/${{ inputs.folder }}
      - run: terraform plan -out=/tf/${{ inputs.folder }}.tfplan
        shell: sh
        working-directory: base/builds/${{ inputs.folder }}
      - run: terraform apply -auto-approve --parallelism=1 /tf/${{ inputs.folder }}.tfplan
        shell: sh
        working-directory: base/builds/${{ inputs.folder }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: argocd-tls
  namespace: argocd
spec:
  endpoints:
  - fqdn:
      hostname: "argocd-server.argocd.svc.cluster.local"
      port: 443
  tls:
    caCertificateRefs:
    - group: ''
      kind: Secret
      name: argocd-server-tls

  
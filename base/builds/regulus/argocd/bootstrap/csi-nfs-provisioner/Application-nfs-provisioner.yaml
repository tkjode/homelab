apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nfs-provisioner
  namespace: argocd
spec:
  project: storage
  sources:
  - chart: nfs-subdir-external-provisioner
    repoURL: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner
    helm:
      valueFiles:
      - $values/base/builds/regulus/argocd/bootstrap/csi-nfs-provisioner/values.yaml
  - repoURL: ssh://git@github.com/tkjode/homelab
    targetRevision: HEAD
    ref: values
  destination:
    namespace: nfs-system
    server: https://kubernetes.default.svc
  revisionHistoryLimit: 0
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    automated:
      prune: false
      selfHeal: false
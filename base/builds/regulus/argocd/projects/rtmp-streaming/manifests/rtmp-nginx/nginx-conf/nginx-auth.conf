daemon off;

error_log /dev/stdout info;

events {
    worker_connections 1024;
}

http {
    root /www/static;
    sendfile off;
    tcp_nopush on;
    server_tokens off;
    access_log /dev/stdout combined;

    server {
        listen 80;

        location /auth {
            auth_basic "RTMP Publish Authorization";
            auth_basic_user_file /etc/nginx/.htpasswd
        }
    }
}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-hls
spec:
  hostnames:
  - hls.phalnet.com
  - hls.apps.phalnet.com
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: rtmp-relay
    namespace: default
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: hls
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
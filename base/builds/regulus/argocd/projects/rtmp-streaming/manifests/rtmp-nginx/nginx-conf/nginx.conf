daemon off;

error_log /dev/stdout info;

events {
  worker_connections 1024;
}

rtmp {
  server {
    listen 1935;
    chunk_size 4000;

    application stream {
      live on;

      exec ffmpeg -i rtmp://localhost:1935/stream/$name
        -c:a libfdk_aac -b:a 192k -c:v libx264 -b:v 8000k -f flv -g 30 -r 30 -s 1920x1080 -preset faster -profile:v baseline rtmp://localhost:1935/hls/$name_1080p8000k
        -c:a libfdk_aac -b:a 128k -c:v libx264 -b:v 2500k -f flv -g 30 -r 30 -s 1280x720 -preset faster -profile:v baseline rtmp://localhost:1935/hls/$name_720p2628kbs
        -c:a libfdk_aac -b:a 128k -c:v libx264 -b:v 1000k -f flv -g 30 -r 30 -s 854x480 -preset faster -profile:v baseline rtmp://localhost:1935/hls/$name_480p1128kbs;
    }

    application hls {
      live on;
      hls on;
      hls_fragment_naming system;
      hls_fragment 1;
      hls_playlist_length 4;
      hls_path /opt/data/hls;
      hls_nested on;

      hls_variant _1080p8000k BANDWIDTH=8000000,RESOLUTION=1920x1080;
      hls_variant _720p2628kbs BANDWIDTH=2628000,RESOLUTION=1280x720;
      hls_variant _480p1128kbs BANDWIDTH=1128000,RESOLUTION=854x480;
    }
  }
}

http {
  root /www/static;
  sendfile off;
  tcp_nopush on;
  server_tokens off;
  access_log /dev/stdout combined;

  server {
    listen 80;

    location /hls {
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
      }
      root /opt/data;
      add_header Cache-Control no-cache;
      add_header Access-Control-Allow-Origin *;
    }

    location /live {
      alias /opt/data/hls;
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
      }
      add_header Cache-Control no-cache;
      add_header Access-Control-Allow-Origin *;
    }

    location /stat {
      rtmp_stat all;
      rtmp_stat_stylesheet stat.xsl;
    }

    location /stat.xsl {
      root /www/static;
    }

    location /crossdomain.xml {
      default_type text/xml;
      expires 24h;
    }
  }
}

daemon off;

error_log /dev/stdout info;

events {
  worker_connections 1024;
}

rtmp {
  server {
    listen 1935;
    chunk_size 4000;

    application stream {
      live on;

      exec ffmpeg -i rtmp://localhost:1935/stream/$name
        -c:a libfdk_aac -b:a 192k -c:v libx264 -b:v 12000k -f flv -g 30 -r 30 -s 1920x1080 -preset ultrafast -qp 0 -profile:v baseline rtmp://localhost:1935/hls/$name_1080p12000k;
    }

    application hls {
      live on;
      hls on;
      hls_fragment_naming system;
      hls_fragment 4s;
      hls_playlist_length 30s;
      hls_path /opt/data/hls;
      hls_nested on;

      hls_variant _1080p12000k BANDWIDTH=12000000,RESOLUTION=1920x1080;
    }
  }
}

http {
  root /www/static;
  sendfile off;
  tcp_nopush on;
  server_tokens off;
  access_log /dev/stdout combined;

  server {
    listen 80;

    location /hls {
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
      }
      root /opt/data;
      add_header Cache-Control no-cache;
      add_header Access-Control-Allow-Origin *;
    }

    location /live {
      alias /opt/data/hls;
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
      }
      add_header Cache-Control no-cache;
      add_header Access-Control-Allow-Origin *;
    }

    location /stat {
      rtmp_stat all;
      rtmp_stat_stylesheet stat.xsl;
    }

    location /stat.xsl {
      root /www/static;
    }

    location /crossdomain.xml {
      default_type text/xml;
      expires 24h;
    }
  }
}

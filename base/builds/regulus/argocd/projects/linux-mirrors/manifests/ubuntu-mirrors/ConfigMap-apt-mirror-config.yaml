apiVersion: v1
kind: ConfigMap
metadata:
  name: apt-mirror-config
data:
  mirror.list: |-
    set base_path /out
    set mirror_path $base_path/mirror
    set skel_path $base_path/skel
    set var_path $base_path/var
    set _tilde 0
    set nthreads 4
    set limit_rate 4096k



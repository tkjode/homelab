apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ubuntu-mirrors
  namespace: argocd
spec:
  project: linux-mirrors
  sources:
  - repoURL: ssh://git@github.com/tkjode/homelab
    targetRevision: HEAD
    path: base/builds/regulus/argocd/projects/linux-mirrors/manifests/ubuntu-mirrors/
  destination:
    namespace: ubuntu-mirrors
    server: https://kubernetes.default.svc
  revisionHistoryLimit: 0
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: homepage
  namespace: homepage
resources:
  - Deployment-homepage.yaml
  - HTTPRoute-homepage.yaml
#  - ConfigMap-homepage-settings.yaml   # Use Generator
  - RBAC-homepage.yaml
  - ServiceAccount-homepage.yaml
  - Secret-homepage-sa-token.yaml
  - Service-homepage.yaml
configMapGenerator:
- name: homepage-settings
  files:
  - configs/bookmarks.yaml
  - configs/custom.css
  - configs/custom.js
  - configs/docker.yaml
  - configs/kubernetes.yaml
  - configs/services.yaml
  - configs/settings.yaml
  - configs/widgets.yaml
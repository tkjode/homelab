apiVersion: v1
kind: PersistentVolume
metadata:
  name: sonarr-nzbget-tvshows
  namespace: sonarr
spec:
  storageClassName: nfs-bind
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  capacity:
    storage: 16Ti
  accessModes:
  - ReadWriteMany
  nfs:
    path: /srv/nas/kubepv/regulus/stateful/sonarr#exports
    server: 10.0.0.5
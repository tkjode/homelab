apiVersion: v1
kind: PersistentVolume
metadata:
  name: sonarr-config
  namespace: sonarr
spec:
  storageClassName: iscsi
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  capacity:
    storage: 8Gi
  accessModes:
  - ReadWriteOnce
  iscsi:
    targetPortal: 192.168.64.3:3260
    iqn: iqn.2026-02.com.phalnet.regulus:pv00
    lun: 5
    fsType: ext4
    readOnly: false
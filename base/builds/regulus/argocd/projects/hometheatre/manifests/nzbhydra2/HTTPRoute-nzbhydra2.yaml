apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nzbhydra2
  namespace: nzbhydra2
spec:
  hostnames:
  - nzbhydra2.apps.phalnet.com
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: cluster-ingress
    namespace: default
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: nzbhydra2
      port: 5076
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
apiVersion: v1
kind: PersistentVolume
metadata:
  name: radarr-nzbget-movies
  namespace: radarr
spec:
  storageClassName: nfs-bind
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  capacity:
    storage: 16Ti
  accessModes:
  - ReadWriteMany
  nfs:
    path: /srv/nas/kubepv/regulus/stateful/radarr#exports
    server: 10.0.0.5
apiVersion: v1
kind: PersistentVolume
metadata:
  name: open-webui
  namespace: open-webui
spec:
  storageClassName: iscsi
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  capacity:
    storage: 10Gi
  accessModes:
  - ReadWriteOnce
  iscsi:
    targetPortal: 192.168.64.3:3260
    iqn: iqn.2026-02.com.phalnet.regulus:pv00
    lun: 10
    fsType: ext4
    readOnly: false
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: open-webui
      app.kubernetes.io/name: open-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: open-webui
        app.kubernetes.io/name: open-webui
    spec:
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:0.9.6
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        envFrom:
          - configMapRef:
              name: open-webui-envvars
        env:
        - name: WEBUI_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: webui-secret
              key: secret-key
        - name: WEBUI_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: webui-secret
              key: admin-default-password
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - mountPath: /app/backend/data
          name: webui-storage
      volumes:
      - name: webui-storage
        persistentVolumeClaim:
          claimName: open-webui


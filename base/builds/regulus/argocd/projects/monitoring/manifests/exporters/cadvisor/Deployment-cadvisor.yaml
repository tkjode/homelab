apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cadvisor
  template:
    metadata:
      annotations:
        prometheus.io/scrape: 'true' 
        prometheus.io/path: '/metrics'
        prometheus.io/port: '9092'
      labels:
        app.kubernetes.io/name: cadvisor
    spec:
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.47.2
          args:
          - "-port=9092"
          ports:
            - name: http-metrics
              containerPort: 9092
              protocol: TCP
          securityContext:
            privileged: true
      hostNetwork: true
      hostPID: true 
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
spec:
  project: landingpage
  sources:
  - chart: skyhook/radar
    name: radar
    repoURL: https://skyhook-io.github.io/helm-charts
    targetRevision: 1.3.2
    helm:
      valueFiles:
      - $values/base/builds/regulus/argocd/projects/monitoring/manifests/radar/values.yaml
  - repoURL: ssh://git@github.com/tkjode/homelab
    name: gateway-httproute
    targetRevision: HEAD
    path: base/builds/regulus/argocd/projects/monitoring/manifests/radar
  destination:
    namespace: radar
    server: https://kubernetes.default.svc
  revisionHistoryLimit: 0
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true